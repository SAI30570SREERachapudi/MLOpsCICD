name: ML CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - run: python train.py

      - uses: actions/upload-artifact@v4
        with:
          name: model
          path: model.pkl

  validate:
    runs-on: ubuntu-latest
    needs: train

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: model

      - run: python validate.py
